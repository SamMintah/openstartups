
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--color-text-primary)}
h2{font-size:18px;font-weight:500;margin-bottom:1rem}
h3{font-size:15px;font-weight:500}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
.top-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:1.25rem;flex-wrap:wrap}
.search-box{flex:1;min-width:180px;padding:8px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary)}
.search-box:focus{outline:none;border-color:var(--color-border-primary)}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.filter-btn{font-size:12px;padding:4px 10px;border:0.5px solid var(--color-border-secondary);border-radius:20px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary);transition:all .15s}
.filter-btn:hover,.filter-btn.active{background:var(--color-background-info);color:var(--color-text-info);border-color:transparent}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.25rem}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.7rem 1rem}
.stat-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:3px}
.stat-value{font-size:18px;font-weight:500}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:var(--color-border-secondary)}
.card-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.card-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;flex-shrink:0;color:#fff}
.card-meta{flex:1;min-width:0}
.card-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-desc{font-size:12px;color:var(--color-text-secondary);margin-top:2px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;align-items:center}
.tag{font-size:11px;padding:2px 8px;border-radius:12px;font-weight:500}
.tag-cat{background:var(--color-background-info);color:var(--color-text-info)}
.tag-mrr{background:var(--color-background-success);color:var(--color-text-success)}
.tag-growth{background:var(--color-background-warning);color:var(--color-text-warning)}
.tag-open{background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-secondary)}
.mrr-badge{margin-left:auto;font-size:13px;font-weight:500;color:var(--color-text-success)}
.rank{font-size:11px;color:var(--color-text-tertiary);margin-top:1px}

/* detail panel */
.detail{display:none;background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:12px}
.detail.open{display:block}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:1rem 0}
.detail-item{background:var(--color-background-primary);border-radius:var(--border-radius-md);padding:.75rem 1rem}
.detail-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:4px}
.detail-value{font-size:14px;font-weight:500}
.doc-list{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:.75rem}
.doc-item{font-size:12px;padding:6px 10px;background:var(--color-background-primary);border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:6px}
.doc-item i{font-size:14px;color:var(--color-text-secondary)}
.section-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--color-text-secondary);margin:1rem 0 .5rem}
.build-step{display:flex;gap:10px;align-items:flex-start;padding:6px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.build-step:last-child{border-bottom:none}
.step-n{width:22px;height:22px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-text{font-size:13px;line-height:1.5}
.close-btn{float:right;font-size:12px;color:var(--color-text-secondary);cursor:pointer;padding:2px 8px;border:0.5px solid var(--color-border-secondary);border-radius:12px;background:var(--color-background-primary)}
.close-btn:hover{color:var(--color-text-primary)}
.empty{text-align:center;padding:2rem;color:var(--color-text-secondary);font-size:14px}
.count-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:.75rem}
</style>

function mrr(v){
  if(v>=1000000) return '$'+(v/1000000).toFixed(1)+'M';
  if(v>=1000) return '$'+(v/1000).toFixed(0)+'k';
  return '$'+v;
}

function color(i){return COLORS[i%COLORS.length]}

    <div style="margin-top:1rem;display:flex;gap:8px;flex-wrap:wrap">
      <button onclick="event.stopPropagation();sendPrompt('Write the full business-model.md doc for ${s.name}: revenue model, pricing, unit economics, LTV/CAC')" style="font-size:12px;padding:6px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer">Write business-model.md ↗</button>
      <button onclick="event.stopPropagation();sendPrompt('Write the full build-guide.md for ${s.name} — step by step, week by week, how to build the MVP')" style="font-size:12px;padding:6px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer">Write build-guide.md ↗</button>
      <a href="${s.source}" target="_blank" style="font-size:12px;padding:6px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-secondary);text-decoration:none">View on TrustMRR ↗</a>
    </div>
  </div>`;
}

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const filtered=startups.filter(s=>{
    const matchCat=activeFilter==='all'||s.cat===activeFilter||(activeFilter==='Mobile'&&s.cat==='Mobile')||(activeFilter==='Content'&&s.cat==='Content');
    const matchQ=!q||s.name.toLowerCase().includes(q)||s.desc.toLowerCase().includes(q)||s.cat.toLowerCase().includes(q)||s.problem.toLowerCase().includes(q);
    return matchCat&&matchQ;
  });
  const list=document.getElementById('card-list');
  if(!filtered.length){list.innerHTML=`<div class="empty">No startups match that filter.</div>`;return;}
  list.innerHTML=filtered.map((s,i)=>cardHtml(s,i)).join('');
  document.getElementById('result-count').textContent=`Showing ${filtered.length} of ${startups.length}`;
}

function filterCards(){render()}
function setFilter(f,btn){
  activeFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function toggleDetail(id){
  const d=document.getElementById('detail-'+id);
  if(d.classList.contains('open')){d.classList.remove('open')}else{
    document.querySelectorAll('.detail.open').forEach(x=>x.classList.remove('open'));
    d.classList.add('open');
    d.scrollIntoView({behavior:'smooth',block:'nearest'});
  }
}
function closeDetail(id){document.getElementById('detail-'+id).classList.remove('open')}

render();
</script>
